valuesObject:
  metrics-server:
    nodeSelector:
      karpenter.sh/nodepool: karpenter-on-demand
    tolerations:
      - key: workload.example/nodepool
        operator: Equal
        value: karpenter-general
        effect: NoSchedule
    args:
      - --kubelet-insecure-tls
      - --metric-resolution=15s
