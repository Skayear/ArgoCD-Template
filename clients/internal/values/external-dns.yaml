valuesObject:
  enabled: true
  external-dns:
    nodeSelector:
      karpenter.sh/nodepool: karpenter-on-demand
    tolerations:
      - key: workload.example/nodepool
        operator: Equal
        value: karpenter-general
        effect: NoSchedule
    provider:
      name: aws
    domainFilters:
      - internal.example.com
    txtOwnerId: example-cluster
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/external-dns-route53
    extraArgs:
      aws-zone-type: public
      annotation-filter: external-dns.alpha.kubernetes.io/access=public
