valuesObject:
  enabled: true
  prometheus-postgres-exporter:
    nodeSelector:
      karpenter.sh/nodepool: karpenter-on-demand
    tolerations:
      - key: workload.example/nodepool
        operator: Equal
        value: karpenter-general
        effect: NoSchedule
    config:
      datasource:
        host: sonarqube-postgres.<RDS_ENDPOINT>
        port: "5432"
        database: sonarqube
        user: sonarqube_admin
        passwordSecret:
          name: sonarqube
          key: jdbc-password
        sslmode: require
    serviceMonitor:
      enabled: true
      interval: 30s
      labels:
        release: internal-prometheus-stack
