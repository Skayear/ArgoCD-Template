valuesObject:
  ec2NodeClasses:
    enabled: true
    items:
      - name: default
        role: Karpenter-example-cluster-<SUFFIX>
        amiFamily: AL2023
        amiSelectorTerms:
          - id: ami-<AMI_ID>
        subnetSelectorTerms:
          - tags:
              karpenter.sh/discovery: internal-eks-karpenter
        securityGroupSelectorTerms:
          - tags:
              karpenter.sh/discovery: internal-eks-karpenter

  nodePools:
    enabled: true
    items:
      - name: karpenter-on-demand
        nodeClassRef:
          name: default
        taints:
          - key: workload.example/nodepool
            value: karpenter-general
            effect: NoSchedule
        requirements:
          - key: karpenter.sh/capacity-type
            operator: In
            values:
              - on-demand
          - key: kubernetes.io/arch
            operator: In
            values:
              - amd64
          - key: kubernetes.io/os
            operator: In
            values:
              - linux
          - key: karpenter.k8s.aws/instance-family
            operator: In
            values:
              - m7i
              - m7i-flex
              - m6i
              - m6a
              - m7a
          - key: karpenter.k8s.aws/instance-size
            operator: In
            values:
              - large
              - xlarge

        limits:
          cpu: "16"
          memory: 64Gi
        disruption:
          consolidationPolicy: WhenEmptyOrUnderutilized
          consolidateAfter: 5m
