name: ArgoCD Admin Toggle

on:
  workflow_dispatch:
    inputs:
      action:
        description: "ArgoCD admin action"
        required: true
        type: choice
        options:
          - enable
          - disable
        default: disable

      namespace:
        description: "ArgoCD namespace"
        required: true
        type: string
        default: "argocd"

jobs:
  load-environment-vars:
    name: Load environment variables
    runs-on: ubuntu-latest
    environment: "devops"
    outputs:
      cluster_name: ${{ steps.export.outputs.cluster_name }}
      aws_region: ${{ steps.export.outputs.aws_region }}
    steps:
      - name: Export environment variables
        id: export
        shell: bash
        run: |
          {
            echo "cluster_name=${{ vars.EKS_CLUSTER_NAME }}"
            echo "aws_region=${{ vars.AWS_REGION }}"
          } >> "$GITHUB_OUTPUT"

  patch-argocd-admin:
    name: Patch ArgoCD admin access
    runs-on: ubuntu-latest
    needs:
      - load-environment-vars
    environment: "devops"

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ needs.load-environment-vars.outputs.aws_region }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          aws eks update-kubeconfig \
            --name "${{ needs.load-environment-vars.outputs.cluster_name }}" \
            --region "${{ needs.load-environment-vars.outputs.aws_region }}"

      - name: Patch ArgoCD admin.enabled
        shell: bash
        run: |
          set -euo pipefail

          NAMESPACE="${{ inputs.namespace }}"
          ACTION="${{ inputs.action }}"

          if [ "${ACTION}" = "enable" ]; then
            ADMIN_ENABLED="true"
          else
            ADMIN_ENABLED="false"
          fi

          echo "Patching argocd-cm in namespace ${NAMESPACE}"
          echo "admin.enabled=${ADMIN_ENABLED}"

          kubectl -n "${NAMESPACE}" patch cm argocd-cm \
            --type merge \
            -p "{\"data\":{\"admin.enabled\":\"${ADMIN_ENABLED}\"}}"

      - name: Verify current value
        shell: bash
        run: |
          set -euo pipefail

          NAMESPACE="${{ inputs.namespace }}"

          echo "Current argocd-cm admin.enabled value:"
          kubectl -n "${NAMESPACE}" get cm argocd-cm \
            -o jsonpath='{.data.admin\.enabled}'

          echo ""
