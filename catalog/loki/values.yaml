enabled: false

loki:
  deploymentMode: SingleBinary

  monitoring:
    serviceMonitor:
      labels:
        observability_stack: loki
      relabelings:
        - action: replace
          targetLabel: observability_stack
          replacement: loki

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    # Este schema mantiene el modelo TSDB del repo viejo. Para backends que no
    # sean S3 compatibles, el cliente debe sobreescribir `object_store`.
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    pattern_ingester:
      enabled: true

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true

    rulerConfig:
      enable_api: true

  minio:
    enabled: false

  resultsCache:
    enabled: false

  chunksCache:
    enabled: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    nodeSelector: {}
    tolerations: []
    affinity: {}

  gateway:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}

  # En SingleBinary no queremos desplegar componentes separados.
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomCompactor:
    replicas: 0
  bloomGateway:
    replicas: 0
  ruler:
    replicas: 0
