enabled: false

prometheus-blackbox-exporter:
  releaseLabel: false

  config:
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions:
            - HTTP/1.1
            - HTTP/2.0
          follow_redirects: true
          preferred_ip_protocol: ip4
      http_2xx_no_redirect:
        prober: http
        timeout: 5s
        http:
          valid_http_versions:
            - HTTP/1.1
            - HTTP/2.0
          follow_redirects: false
          preferred_ip_protocol: ip4
      tcp_connect:
        prober: tcp
        timeout: 5s

  serviceMonitor:
    selfMonitor:
      enabled: true
      labels: {}
      interval: 30s
      scrapeTimeout: 10s
    enabled: false
    defaults:
      labels: {}
      interval: 30s
      scrapeTimeout: 10s
      module: http_2xx
    targets: []

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
