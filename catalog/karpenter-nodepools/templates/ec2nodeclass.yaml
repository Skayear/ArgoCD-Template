{{- if .Values.ec2NodeClasses.enabled }}
{{- range .Values.ec2NodeClasses.items }}
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .name | quote }}
spec:
  role: {{ .role | quote }}
  amiFamily: {{ .amiFamily | default "AL2023" | quote }}
  {{- with .amiSelectorTerms }}
  amiSelectorTerms:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  subnetSelectorTerms:
    {{- toYaml .subnetSelectorTerms | nindent 4 }}
  securityGroupSelectorTerms:
    {{- toYaml .securityGroupSelectorTerms | nindent 4 }}
---
{{- end }}
{{- end }}
