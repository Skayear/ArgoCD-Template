{{- if .Values.clusters.enabled }}
{{- range .Values.clusters.items }}
{{- if .externalSecret }}
{{- $secretName := .secretName | default (printf "%s-cluster" (regexReplaceAll "[^a-z0-9.-]+" (lower .name) "-")) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName | quote }}
  namespace: argocd
spec:
  refreshInterval: {{ .externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .externalSecret.secretStoreRef.name | quote }}
    kind: {{ .externalSecret.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ $secretName | quote }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      data:
        name: {{ .name | quote }}
        server: {{ .server | quote }}
        {{- with .project }}
        project: {{ . | quote }}
        {{- end }}
        {{- if .externalSecret.tlsInsecure }}
        config: '{{`{{ .config | fromJson | mergeOverwrite (dict "tlsClientConfig" (dict "insecure" true)) | toJson }}`}}'
        {{- else }}
        config: '{{`{{ .config }}`}}'
        {{- end }}
  data:
    - secretKey: config
      remoteRef:
        key: {{ .externalSecret.secretKey | quote }}
        property: {{ .externalSecret.property | default "config" | quote }}
---
{{- end }}
{{- end }}
{{- end }}
