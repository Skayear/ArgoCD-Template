{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.target.name | default "grafana-runtime-secrets" | quote }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" | quote }}
  target:
    name: {{ .Values.externalSecrets.target.name | default "grafana-runtime-secrets" | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | default "Owner" | quote }}
  {{- with .Values.externalSecrets.data }}
  data:
  {{- range . }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ .remoteRef.key | quote }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property | quote }}
        {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
